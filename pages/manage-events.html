<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Event - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 font-sans">

    <div id="dynamicNavbar"></div>

    <div class="p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" id="page-title">Manajemen Event</h1>
                <p class="text-gray-500" id="total-events">Total Event: 0</p>
            </div>
            <button id="btn-add-event" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">
                + Tambah Event
            </button>
        </div>

        <div class="mb-4">
            <input type="text" id="search-event" placeholder="Cari nama event..." class="w-full md:w-1/3 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="bg-white rounded-lg shadow border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-600 text-sm">
                    <tr>
                        <th class="p-4 border-b">ID EVENT</th>
                        <th class="p-4 border-b">JUDUL ACARA</th>
                        <th class="p-4 border-b">TANGGAL</th>
                        <th class="p-4 border-b">LOKASI (VENUE)</th>
                        <th class="p-4 border-b">KAPASITAS</th>
                        <th class="p-4 border-b">SEATING</th>
                        <th class="p-4 border-b text-center">AKSI</th>
                    </tr>
                </thead>
                <tbody id="event-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <div id="modal-form" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-[32rem] shadow-xl max-h-screen overflow-y-auto">
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-gray-800">Tambah Event Baru</h2>
            <p id="form-error" class="text-red-500 text-sm mb-3 hidden"></p>
            
            <form id="event-form">
                <input type="hidden" id="form-event-id">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">JUDUL ACARA *</label>
                    <input type="text" id="form-name" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="cth. Konser Melodi Senja" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">TANGGAL PELAKSANAAN *</label>
                    <input type="datetime-local" id="form-date" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">VENUE / LOKASI *</label>
                    <select id="form-location" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <option value="">-- Pilih Venue --</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">KAPASITAS TOTAL *</label>
                    <input type="number" id="form-capacity" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="cth. 500" min="1" required>
                </div>
                <div class="mb-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="form-seating" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <span class="text-sm font-medium text-gray-700">Aktifkan Konfigurasi Kursi (Reserved Seating)</span>
                    </label>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="btn-cancel-form" class="flex-1 border text-gray-700 py-2 rounded-lg hover:bg-gray-50">Batal</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/manage-events.js"></script>
</body>
</html>

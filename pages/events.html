<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Event - TikTakTuk</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .event-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <header id="dynamicNavbar"></header>

    <main class="container" style="max-width: 1000px;">
        <h1 class="page-title">Cari Event</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Temukan event menarik dan beli tiketnya sekarang.</p>

        <div class="events-grid" id="eventsContainer">
            <!-- Event cards will be injected here -->
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/events.js"></script>
</body>

</html>

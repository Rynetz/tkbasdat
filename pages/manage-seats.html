<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kursi - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-gray-50 font-sans">

    <div id="dynamicNavbar"></div>

    <div class="p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800" id="page-title">Manajemen Kursi</h1>
            <button id="btn-add-seat" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">
                + Tambah Kursi
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow border border-gray-100 flex items-center gap-4">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-full text-xl">💺</div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Total Kursi</p>
                    <p class="text-2xl font-bold text-gray-800" id="stat-total">0</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border border-gray-100 flex items-center gap-4">
                <div class="bg-green-100 text-green-600 p-3 rounded-full text-xl">✅</div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Tersedia</p>
                    <p class="text-2xl font-bold text-gray-800" id="stat-available">0</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border border-gray-100 flex items-center gap-4">
                <div class="bg-red-100 text-red-600 p-3 rounded-full text-xl">🔒</div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Terisi</p>
                    <p class="text-2xl font-bold text-gray-800" id="stat-filled">0</p>
                </div>
            </div>
        </div>

        <div class="mb-6 flex flex-col md:flex-row gap-4">
            <input type="text" id="search-seat" placeholder="Cari berdasarkan venue, section, atau nomor..."
                class="w-full md:w-1/2 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">

            <select id="filter-venue"
                class="w-full md:w-1/4 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">Semua Venue</option>
            </select>
        </div>

        <div class="bg-white rounded-lg shadow border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-600 text-sm">
                    <tr>
                        <th class="p-4 border-b">VENUE</th>
                        <th class="p-4 border-b">SECTION</th>
                        <th class="p-4 border-b">BARIS</th>
                        <th class="p-4 border-b">NO. KURSI</th>
                        <th class="p-4 border-b">STATUS</th>
                        <th class="p-4 border-b text-center" id="col-aksi">AKSI</th>
                    </tr>
                </thead>
                <tbody id="seat-table-body">
                    <!-- Data kursi render dari JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL FORM CREATE / UPDATE KURSI -->
    <div id="modal-form" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl p-6 w-full max-w-[32rem] shadow-xl">
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-gray-800">Tambah Kursi</h2>
            <p id="form-error" class="text-red-500 text-sm mb-3 hidden"></p>

            <form id="seat-form">
                <input type="hidden" id="form-seat-id">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">VENUE *</label>
                    <select id="form-venue"
                        class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <option value="">-- Pilih Venue --</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">SECTION *</label>
                    <input type="text" id="form-section" placeholder="cth: WVIP, VIP, Tribune West"
                        class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">BARIS *</label>
                    <input type="text" id="form-row" placeholder="cth: A, B, C, 1, 2"
                        class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">NO. KURSI *</label>
                    <input type="text" id="form-number" placeholder="cth: 1, 2, 3"
                        class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="btn-cancel-form"
                        class="flex-1 border text-gray-700 py-2 rounded-lg hover:bg-gray-50">Batal</button>
                    <button type="submit" id="btn-submit-form"
                        class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Tambah</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sambungkan ke file JavaScript -->
    <script src="../js/app.js"></script>
    <script src="../js/manage-seats.js"></script>
</body>

</html>

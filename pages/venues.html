<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Venue - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 font-sans">

    <div id="dynamicNavbar"></div>

    <div class="p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Daftar Venue</h1>
                <p class="text-gray-500" id="total-venues">Total Venue: 0</p>
            </div>
            <button id="btn-add-venue" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">
                + Tambah Venue
            </button>
        </div>

        <div class="mb-4">
            <input type="text" id="search-venue" placeholder="Cari venue..." class="w-full md:w-1/3 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="bg-white rounded-lg shadow border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-600 text-sm">
                    <tr>
                        <th class="p-4 border-b">VENUE ID</th>
                        <th class="p-4 border-b">NAMA VENUE</th>
                        <th class="p-4 border-b">KAPASITAS</th>
                        <th class="p-4 border-b">KOTA</th>
                        <th class="p-4 border-b text-center" id="th-action" style="display: none;">AKSI</th>
                    </tr>
                </thead>
                <tbody id="venue-table-body">

                </tbody>
            </table>
        </div>
    </div>

    <div id="modal-form" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-96 shadow-xl">
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-gray-800">Tambah Venue Baru</h2>
            <p id="form-error" class="text-red-500 text-sm mb-3 hidden"></p>
            
            <form id="venue-form">
                <input type="hidden" id="form-venue-id">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">NAMA VENUE *</label>
                    <input type="text" id="form-name" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="cth. Stadion Utama" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">KAPASITAS *</label>
                    <input type="number" id="form-capacity" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="cth. 5000" min="1" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ALAMAT *</label>
                    <textarea id="form-address" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="cth. Jl. Jend. Sudirman" required></textarea>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">KOTA *</label>
                    <input type="text" id="form-city" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="cth. Jakarta" required>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="btn-cancel-form" class="flex-1 border text-gray-700 py-2 rounded-lg hover:bg-gray-50">Batal</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-delete" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-96 shadow-xl border-t-4 border-red-500">
            <h2 class="text-xl font-bold mb-2 text-red-600">Hapus Venue</h2>
            <p class="text-gray-600 mb-6">
                Apakah Anda yakin ingin menghapus venue <span id="delete-venue-name" class="font-bold text-gray-800"></span>? Tindakan ini tidak dapat dibatalkan.
            </p>
            <div class="flex gap-3">
                <button id="btn-cancel-delete" class="flex-1 border text-gray-700 py-2 rounded-lg hover:bg-gray-50 font-medium">Batal</button>
                <button id="btn-confirm-delete" class="flex-1 bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 font-medium">Hapus</button>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/venues.js"></script>
</body>
</html>

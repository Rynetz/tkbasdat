<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TikTakTuk</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; }
    </style>
</head>
<body>
    <header id="dynamicNavbar"></header>
    <main>
        <div class="card auth-container">
            <h2 class="page-title" style="text-align: center; margin-bottom: 1.5rem;">Login ke Akun Anda</h2>
            <div id="loginError" class="d-none" style="color: var(--danger); margin-bottom: 1rem; text-align: center; font-size: 0.875rem;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Masuk</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Belum punya akun? <a href="register.html" style="color: var(--primary);">Daftar di sini</a>
            </p>
        </div>
    </main>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
